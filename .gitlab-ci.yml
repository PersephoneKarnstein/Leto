stages:
  - build

variables:
  PACKAGE_NAME: "hermes-skill"

create-release-zip:
  stage: build
  image: alpine:latest
  before_script:
    - apk add --no-cache zip
  script:
    - echo "Creating release package..."
    - zip -r ${PACKAGE_NAME}.zip SKILL.md scripts/ templates/ .gitlab-ci.yml -x "*.DS_Store" -x "scripts/.DS_Store" -x "__pycache__/*" -x "*.pyc"
    - echo "Package created - ${PACKAGE_NAME}.zip"
    - unzip -l ${PACKAGE_NAME}.zip
  artifacts:
    name: "${PACKAGE_NAME}-${CI_COMMIT_SHORT_SHA}"
    paths:
      - ${PACKAGE_NAME}.zip
    expire_in: 30 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "push"
      when: always

# Note: The following files are NOT included in the package:
# - frida-server-* (download from https://github.com/frida/frida/releases)
# - *.apk files (user-provided)
# - README.md (repo documentation only)
# - .git/ (version control)
#
# Users should download frida-server matching their device:
# curl -sL "https://github.com/frida/frida/releases/download/VERSION/frida-server-VERSION-android-ARCH.xz" -o frida-server.xz
# xz -d frida-server.xz
