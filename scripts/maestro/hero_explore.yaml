# Hero Health App Exploration Flow
# Tests dynamic analysis capabilities

appId: com.herohealth.heroconnect
---
# Launch app
- launchApp

# Wait for initial load
- extendedWaitUntil:
    visible: ".*"
    timeout: 10000

# Take initial screenshot
- takeScreenshot: "/tmp/hero_01_launch.png"

# Wait for any splash/loading
- waitForAnimationToEnd

# Take screenshot after load
- takeScreenshot: "/tmp/hero_02_loaded.png"

# Try to find login/signup elements
- runFlow:
    when:
      visible: "Log In|Sign In|Login"
    commands:
      - takeScreenshot: "/tmp/hero_03_login_screen.png"

# Try to find onboarding elements
- runFlow:
    when:
      visible: "Get Started|Continue|Next"
    commands:
      - takeScreenshot: "/tmp/hero_04_onboarding.png"
      - tapOn:
          text: "Get Started|Continue|Next"
          optional: true

# Scroll to see more content
- scroll

# Final screenshot
- takeScreenshot: "/tmp/hero_05_scrolled.png"
